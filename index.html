<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Hub</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Fuse.js for fuzzy search (loaded from CDN, no install required) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js" defer></script>
</head>
<body>

<div id="app">

  <!-- ── Header ───────────────────────────────────────────────────── -->
  <header id="header">
    <button class="icon-btn" id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div id="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span>Knowledge Hub</span>
    </div>

    <div id="search-wrapper">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        id="search-input"
        type="text"
        placeholder="Search documents…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search documents"
        readonly
      />
      <span class="search-shortcut">/</span>
    </div>

    <div id="header-actions">
      <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle dark/light theme">
        <!-- Sun icon (shown in dark mode) -->
        <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon (shown in light mode) -->
        <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Sidebar ───────────────────────────────────────────────────── -->
  <aside id="sidebar">

    <!-- Stats -->
    <div id="stats-panel">
      <div class="stat-item">
        <span class="stat-count" id="stat-total">—</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-item">
        <span class="stat-count" id="stat-folders">—</span>
        <span class="stat-label">Folders</span>
      </div>
      <div class="stat-item">
        <span class="stat-count" id="stat-html">—</span>
        <span class="stat-label">HTML</span>
      </div>
      <div class="stat-item">
        <span class="stat-count" id="stat-md">—</span>
        <span class="stat-label">Markdown</span>
      </div>
      <div class="stat-item" style="grid-column: span 2">
        <span class="stat-count" id="stat-pdf">—</span>
        <span class="stat-label">PDF</span>
      </div>
    </div>

    <!-- File type filters -->
    <div id="filter-bar">
      <button class="filter-pill" data-filter="html">
        <span class="dot dot-html"></span> HTML
      </button>
      <button class="filter-pill" data-filter="markdown">
        <span class="dot dot-md"></span> MD
      </button>
      <button class="filter-pill" data-filter="pdf">
        <span class="dot dot-pdf"></span> PDF
      </button>
    </div>

    <!-- Favorites -->
    <div class="sidebar-section" id="section-favorites">
      <div class="sidebar-section-header" data-section="favorites">
        <span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-1px;margin-right:6px">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          Favorites
        </span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="sidebar-section-content" id="favorites-list">
        <div class="search-hint" style="padding:10px 14px;font-size:0.75rem">No favorites yet. Click ★ on any file.</div>
      </div>
    </div>

    <!-- Recent Documents -->
    <div class="sidebar-section" id="section-recents">
      <div class="sidebar-section-header" data-section="recents">
        <span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px;margin-right:6px">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          Recent
        </span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="sidebar-section-content" id="recents-list">
        <div class="search-hint" style="padding:10px 14px;font-size:0.75rem">No recent documents.</div>
      </div>
    </div>

  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay"></div>

  <!-- ── Main Content ──────────────────────────────────────────────── -->
  <main id="main">

    <!-- Breadcrumbs -->
    <nav id="breadcrumbs" aria-label="Breadcrumb">
      <span class="breadcrumb-item">
        <span class="breadcrumb-link" data-path="">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:3px">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>Home
        </span>
      </span>
    </nav>

    <!-- Folder tree / content -->
    <div id="content">
      <div class="welcome-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <h2>Loading knowledge base…</h2>
        <p>Fetching manifest.json</p>
      </div>
    </div>

  </main>

</div>

<!-- ── Search Overlay ────────────────────────────────────────────── -->
<div id="search-overlay" role="dialog" aria-label="Search">
  <div id="search-modal">
    <div id="search-modal-input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="search-modal-input"
        type="text"
        placeholder="Search documents, folders, content…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Full-text search"
      />
      <button class="icon-btn" id="search-close" title="Close (Esc)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Type filter chips inside modal -->
    <div class="search-type-filters">
      <button class="type-filter-btn active" data-type="all">All</button>
      <button class="type-filter-btn" data-type="html">HTML</button>
      <button class="type-filter-btn" data-type="markdown">Markdown</button>
      <button class="type-filter-btn" data-type="pdf">PDF</button>
    </div>

    <div id="search-results" role="listbox" aria-label="Search results">
      <div class="search-hint">Type to search across all documents…</div>
    </div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────────────── -->
<div id="toast" role="alert" aria-live="polite"></div>

<script src="script.js"></script>
</body>
</html>
